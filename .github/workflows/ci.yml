name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Tesseract
        run: |
          sudo apt-get update
          sudo apt-get install -y tesseract-ocr tesseract-ocr-eng

      - name: Install package (CPU core)
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install -e .
          pip install pytest ruff

      - name: Lint
        run: ruff check src tests scripts || true

      - name: Run tests
        run: PYTHONPATH=src pytest tests/ -q

      - name: Smoke-test the pipeline (generate + ablate)
        run: |
          PYTHONPATH=src python scripts/generate_synthetic_docs.py --n 4 --severity 0.9
          PYTHONPATH=src python scripts/run_ocr_ablation.py
